<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiffStudio — Lesson Differentiation Studio</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"DM Sans"', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
          },
        },
      };
    </script>

    <style>
      /* ── Base ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #F1F5F9;
        color: #1E293B;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root { min-height: 100vh; display: flex; flex-direction: column; }

      /* ── Streaming cursor ── */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      .streaming-cursor {
        display: inline-block;
        width: 2px;
        height: 1.1em;
        background-color: #F59E0B;
        margin-left: 2px;
        vertical-align: text-bottom;
        animation: blink 1s step-end infinite;
      }

      /* ── Toast animations ── */
      @keyframes slideInRight {
        from { transform: translateX(110%); opacity: 0; }
        to   { transform: translateX(0);    opacity: 1; }
      }
      @keyframes slideOutRight {
        from { transform: translateX(0);    opacity: 1; }
        to   { transform: translateX(110%); opacity: 0; }
      }
      .toast-enter { animation: slideInRight 200ms ease forwards; }
      .toast-exit  { animation: slideOutRight 200ms ease forwards; }

      /* ── Section opacity fade-in ── */
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .section-fade { animation: fadeIn 200ms ease forwards; }

      /* ── Global amber focus ring ── */
      :focus-visible {
        outline: 2px solid #F59E0B !important;
        outline-offset: 2px !important;
        border-radius: 4px;
      }

      /* ── Scrollbars ── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

      /* hide scrollbar for filter pill rows */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* ── line-clamp for prompt text ── */
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ── Tailwind animate-spin ── */
      @keyframes spin { to { transform: rotate(360deg); } }
      .animate-spin { animation: spin 1s linear infinite; }

      /* ── Responsive: hide right panel on small screens ── */
      @media (max-width: 767px) {
        .artifact-panel-col { display: none; }
        .artifact-panel-col.show-mobile { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
